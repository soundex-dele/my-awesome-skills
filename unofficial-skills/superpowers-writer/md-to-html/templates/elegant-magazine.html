<section style="padding: 15px 10px; background-color: #faf9f7; font-size: 16px; line-height: 1.8; color: #2c3e50; font-family: Georgia, Times New Roman, serif;">
    <section style="max-width: 680px; margin: 0 auto; padding: 35px 25px; background-color: #ffffff; border-radius: 8px;">
        <!-- 头部 -->
        <header style="text-align: center; margin-bottom: 35px; padding-bottom: 25px; border-bottom: 1px solid #e8e4df;">
            <section style="font-size: 12px; color: #c9a959; margin-bottom: 15px; font-weight: 600; letter-spacing: 0.1em;">
                FEATURE ARTICLE
            </section>

            <h1 style="font-size: 22px; font-weight: 500; margin: 0 0 15px 0; color: #2c3e50; line-height: 1.3;">
                {{title}}
            </h1>

            <p style="font-size: 14px; color: #7f8c8d; font-style: italic; margin: 0 0 18px 0; font-weight: 300;">
                {{subtitle}}
            </p>

            <section style="font-size: 13px; color: #7f8c8d; font-style: italic;">
                <span style="margin: 0 10px;">{{author}}</span>
                <span style="color: #c9a959;">•</span>
                <span style="margin: 0 10px;">{{date}}</span>
            </section>
        </header>

        <!-- 内容区域 -->
        <main style="font-size: 16px;">
            {{content}}
        </main>

        <!-- 页脚 -->
        <footer style="margin-top: 40px; padding-top: 25px; border-top: 1px solid #e8e4df; text-align: center; color: #7f8c8d; font-size: 13px; font-style: italic;">
            ~ End of Article ~
        </footer>
    </section>
</section>

<!-- 内容元素样式 -->

<!-- 段落 -->
<p style="margin-bottom: 18px; text-align: justify; line-height: 1.8;">

<!-- 二级标题 -->
<h2 style="font-size: 18px; margin: 30px 0 18px; text-align: center; font-weight: 500; color: #2c3e50; padding-bottom: 12px; border-bottom: 2px solid #c9a959;">

<!-- 三级标题 -->
<h3 style="font-size: 16px; margin: 25px 0 15px; font-style: italic; color: #c17f59; font-weight: 500;">

<!-- 代码块 -->
<pre style="background-color: #f5f3f0; border: 1px solid #e8e4df; border-radius: 4px; padding: 18px; margin: 20px 0; overflow-x: auto; font-size: 13px; line-height: 1.6; font-family: SF Mono, Monaco, monospace; color: #2c3e50;">

<!-- 行内代码 -->
<code style="background-color: #faf9f7; padding: 3px 6px; border-radius: 3px; font-size: 13px; color: #c17f59; font-family: SF Mono, Monaco, monospace;">

<!-- 引用块 -->
<blockquote style="border-left: 3px solid #c9a959; padding: 18px 20px; margin: 20px 0; background-color: #faf9f7; font-style: italic; border-radius: 0 6px 6px 0; color: #7f8c8d;">

<!-- 无序列表 -->
<ul style="margin: 18px 0; padding-left: 25px;">
    <li style="margin: 10px 0; line-height: 1.8;">

<!-- 有序列表 -->
<ol style="margin: 18px 0; padding-left: 25px;">
    <li style="margin: 10px 0; color: #8b9a7d; font-weight: 500;">

<!-- 表格 -->
<table style="width: 100%; border-collapse: collapse; margin: 25px 0; font-size: 14px;">
    <thead>
        <tr style="background-color: #faf9f7;">
            <th style="padding: 12px 16px; text-align: left; border-bottom: 1px solid #e8e4df; color: #8b9a7d; font-weight: 500; font-size: 12px;">
            <td style="padding: 12px 16px; text-align: left; border-bottom: 1px solid #e8e4df;">
    <tbody>
        <tr>
            <td style="padding: 12px 16px; border-bottom: 1px solid #e8e4df;">

<!-- 链接 -->
<a style="color: #c17f59; text-decoration: underline;">

<!-- 强调 -->
<strong style="color: #8b9a7d; font-weight: 500;">

<em style="color: #c17f59;">

<!-- 分隔线 -->
<hr style="border: none; height: 1px; background-color: #e8e4df; margin: 35px 0;">

<!-- 图片 -->
<img style="max-width: 100%; height: auto; border-radius: 4px; margin: 18px 0; display: block; border: 1px solid #e8e4df;">
