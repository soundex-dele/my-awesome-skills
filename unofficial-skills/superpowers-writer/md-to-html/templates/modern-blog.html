<section style="padding: 15px 10px; background-color: #f5f7fa; font-size: 16px; line-height: 1.8; color: #2c3e50; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;">
    <section style="max-width: 680px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden;">
        <section style="padding: 35px 25px;">
            <!-- 头部 -->
            <header style="text-align: center; margin-bottom: 35px; padding-bottom: 25px; border-bottom: 2px dashed #e8ecf1;">
                <section style="display: inline-block; background-color: #3498db; color: white; padding: 5px 14px; border-radius: 16px; font-size: 12px; font-weight: 600; margin-bottom: 15px;">
                    Article
                </section>

                <h1 style="font-size: 22px; font-weight: 700; margin: 12px 0; color: #2c3e50; line-height: 1.4;">
                    {{title}}
                </h1>

                <section style="color: #7f8c8d; font-size: 13px;">
                    <span style="display: inline-block; margin: 0 8px;">
                        <span style="display: inline-block; width: 4px; height: 4px; background-color: #e74c3c; border-radius: 50%; margin-right: 6px;"></span>
                        {{author}}
                    </span>
                    <span style="display: inline-block; margin: 0 8px;">
                        <span style="display: inline-block; width: 4px; height: 4px; background-color: #e74c3c; border-radius: 50%; margin-right: 6px;"></span>
                        {{date}}
                    </span>
                </section>
            </header>

            <!-- 内容区域 -->
            <main style="font-size: 16px;">
                {{content}}
            </main>

            <!-- 页脚 -->
            <footer style="margin-top: 40px; padding-top: 20px; border-top: 2px dashed #e8ecf1; text-align: center; color: #7f8c8d; font-size: 13px;">
                感谢阅读 ✨
            </footer>
        </section>
    </section>
</section>

<!-- 内容元素样式 -->

<!-- 段落 -->
<p style="margin-bottom: 18px; color: #34495e; line-height: 1.8;">

<!-- 二级标题 -->
<h2 style="font-size: 18px; margin: 30px 0 18px; padding-left: 12px; border-left: 4px solid #3498db; color: #2c3e50; font-weight: 600;">

<!-- 三级标题 -->
<h3 style="font-size: 16px; margin: 25px 0 15px; color: #3498db; font-weight: 600;">

<!-- 代码块 -->
<pre style="background-color: #f8f9fa; border-radius: 8px; padding: 18px; margin: 20px 0; overflow-x: auto; font-size: 13px; line-height: 1.6; color: #2c3e50; font-family: Monaco, Consolas, monospace;">

<!-- 行内代码 -->
<code style="background-color: #f8f9fa; padding: 3px 8px; border-radius: 4px; font-size: 13px; color: #e74c3c; font-family: Monaco, Consolas, monospace;">

<!-- 引用块 -->
<blockquote style="border-left: 4px solid #3498db; padding: 15px 18px; margin: 20px 0; background-color: #f8f9fa; border-radius: 0 8px 8px 0; color: #7f8c8d;">

<!-- 无序列表 -->
<ul style="margin: 18px 0; padding-left: 22px;">
    <li style="margin: 10px 0; line-height: 1.8;">

<!-- 有序列表 -->
<ol style="margin: 18px 0; padding-left: 22px;">
    <li style="margin: 10px 0; line-height: 1.8;">

<!-- 表格 -->
<table style="width: 100%; border-collapse: separate; border-spacing: 0; margin: 25px 0; border: 1px solid #e8ecf1; border-radius: 8px; font-size: 14px;">
    <thead>
        <tr style="background-color: #3498db;">
            <th style="padding: 12px 16px; text-align: left; color: white; font-weight: 600; font-size: 12px;">
            <td style="padding: 12px 16px; text-align: left; border-bottom: 1px solid #e8ecf1;">
    <tbody>
        <tr style="background-color: #f8f9fa;">
            <td style="padding: 12px 16px; border-bottom: 1px solid #e8ecf1;">
        <tr style="background-color: #ffffff;">
            <td style="padding: 12px 16px; border-bottom: 1px solid #e8ecf1;">

<!-- 链接 -->
<a style="color: #3498db; text-decoration: underline; font-weight: 500;">

<!-- 强调 -->
<strong style="color: #3498db; font-weight: 600;">

<em style="color: #e74c3c;">

<!-- 分隔线 -->
<hr style="border: none; height: 2px; background-color: #e8ecf1; margin: 35px 0;">

<!-- 图片 -->
<img style="max-width: 100%; height: auto; border-radius: 8px; margin: 18px 0; display: block;">
