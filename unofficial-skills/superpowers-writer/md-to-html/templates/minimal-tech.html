<section style="padding: 15px 10px; background-color: #f5f7fa; font-size: 16px; line-height: 1.8; color: #2c3e50; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif;">
    <section style="max-width: 680px; margin: 0 auto; padding: 30px 20px; background-color: #ffffff; border-radius: 8px;">
        <!-- 头部 -->
        <header style="margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e8ecf1;">
            <h1 style="font-size: 22px; font-weight: 700; margin: 0 0 12px 0; color: #2c3e50; line-height: 1.4;">
                {{title}}
            </h1>
            <section style="color: #7f8c8d; font-size: 14px;">
                <span style="color: #3498db;">&lt;/&gt;</span>
                <span style="margin-left: 8px;">{{date}}</span>
                <span style="margin: 0 8px;">|</span>
                <span>{{author}}</span>
            </section>
        </header>

        <!-- 内容区域 -->
        <main style="font-size: 16px;">
            {{content}}
        </main>

        <!-- 页脚 -->
        <footer style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #e8ecf1; text-align: center; color: #7f8c8d; font-size: 13px;">
            Generated with ❤️ by md-to-html
        </footer>
    </section>
</section>

<!-- 内容元素样式 -->

<!-- 段落 -->
<p style="margin-bottom: 18px; color: #2c3e50; line-height: 1.8;">

<!-- 二级标题 -->
<h2 style="font-size: 18px; margin: 30px 0 18px; padding-left: 12px; border-left: 3px solid #3498db; color: #2c3e50; font-weight: 600;">

<!-- 三级标题 -->
<h3 style="font-size: 16px; margin: 25px 0 15px; color: #3498db; font-weight: 600;">

<!-- 代码块 -->
<pre style="background-color: #f8f9fa; border: 1px solid #e8ecf1; border-radius: 6px; padding: 16px; margin: 20px 0; overflow-x: auto; font-size: 13px; line-height: 1.6; color: #2c3e50; font-family: SF Mono, Monaco, Consolas, monospace;">

<!-- 行内代码 -->
<code style="background-color: #f8f9fa; padding: 3px 8px; border-radius: 4px; border: 1px solid #e8ecf1; font-size: 13px; color: #e74c3c; font-family: SF Mono, Monaco, Consolas, monospace;">

<!-- 引用块 -->
<blockquote style="border-left: 3px solid #3498db; padding: 15px 18px; margin: 20px 0; background-color: #f8f9fa; border-radius: 0 6px 6px 0; color: #7f8c8d;">

<!-- 无序列表 -->
<ul style="margin: 18px 0; padding-left: 22px;">
    <li style="margin: 10px 0; line-height: 1.8;">

<!-- 有序列表 -->
<ol style="margin: 18px 0; padding-left: 22px;">
    <li style="margin: 10px 0; line-height: 1.8; color: #3498db; font-weight: 600;">

<!-- 表格 -->
<table style="width: 100%; border-collapse: collapse; margin: 22px 0; background-color: #ffffff; border: 1px solid #e8ecf1; font-size: 14px;">
    <thead>
        <tr style="background-color: #f8f9fa;">
            <th style="padding: 12px 15px; text-align: left; border-bottom: 1px solid #e8ecf1; color: #2c3e50; font-weight: 600; font-size: 13px;">
            <td style="padding: 12px 15px; text-align: left; border-bottom: 1px solid #e8ecf1;">
    <tbody>
        <tr style="background-color: #ffffff;">
            <td style="padding: 12px 15px; border-bottom: 1px solid #e8ecf1;">
        <tr style="background-color: #f8f9fa;">
            <td style="padding: 12px 15px; border-bottom: 1px solid #e8ecf1;">

<!-- 链接 -->
<a style="color: #3498db; text-decoration: underline;">

<!-- 强调 -->
<strong style="color: #2c3e50; font-weight: 600;">

<em style="color: #e74c3c;">

<!-- 分隔线 -->
<hr style="border: none; height: 1px; background-color: #e8ecf1; margin: 35px 0;">

<!-- 图片 -->
<img style="max-width: 100%; height: auto; border-radius: 6px; margin: 18px 0; display: block; border: 1px solid #e8ecf1;">
