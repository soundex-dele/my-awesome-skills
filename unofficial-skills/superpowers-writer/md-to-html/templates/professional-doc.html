<section style="padding: 15px 10px; background-color: #f5f7fa; font-size: 16px; line-height: 1.8; color: #2c3e50; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans, sans-serif;">
    <section style="max-width: 680px; margin: 0 auto; padding: 30px 20px; background-color: #ffffff; border-radius: 8px;">
        <!-- 头部 -->
        <header style="margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e8ecf1;">
            <section style="font-size: 12px; color: #7f8c8d; margin-bottom: 10px;">
                <span style="display: inline-block; padding: 4px 10px; border-radius: 10px; background-color: #f8f9fa; color: #7f8c8d; margin-right: 8px;">
                    📖 Documentation
                </span>
                <span style="display: inline-block; padding: 4px 10px; border-radius: 10px; background-color: #f8f9fa; color: #7f8c8d;">
                    📅 {{date}}
                </span>
            </section>

            <h1 style="font-size: 22px; font-weight: 600; margin: 0 0 10px 0; color: #2c3e50; line-height: 1.3;">
                {{title}}
            </h1>

            <p style="font-size: 14px; color: #7f8c8d; line-height: 1.6; margin: 0;">
                {{description}}
            </p>
        </header>

        <!-- 内容区域 -->
        <main style="font-size: 16px;">
            {{content}}
        </main>

        <!-- 页脚 -->
        <footer style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #e8ecf1; color: #7f8c8d; font-size: 13px;">
            <p style="margin: 0;">© 2024 Your Company. All rights reserved.</p>
        </footer>
    </section>
</section>

<!-- 内容元素样式 -->

<!-- 段落 -->
<p style="margin-bottom: 18px; line-height: 1.8;">

<!-- 二级标题 -->
<h2 style="font-size: 18px; margin: 30px 0 18px; padding-bottom: 10px; border-bottom: 2px solid #e8ecf1; color: #2c3e50; font-weight: 600;">

<!-- 三级标题 -->
<h3 style="font-size: 16px; margin: 25px 0 15px; color: #2c3e50; font-weight: 600;">

<!-- 四级标题 -->
<h4 style="font-size: 15px; margin: 20px 0 12px; color: #7f8c8d; font-weight: 600;">

<!-- 代码块 -->
<pre style="background-color: #f8f9fa; border: 1px solid #e8ecf1; border-radius: 6px; padding: 16px; margin: 20px 0; overflow-x: auto; font-size: 13px; line-height: 1.6; font-family: SF Mono, Monaco, Consolas, monospace; color: #2c3e50;">

<!-- 行内代码 -->
<code style="background-color: #f8f9fa; padding: 3px 8px; border-radius: 4px; border: 1px solid #e8ecf1; font-size: 13px; color: #6f42c1; font-family: SF Mono, Monaco, Consolas, monospace;">

<!-- 引用块 -->
<blockquote style="border-left: 4px solid #0366d6; padding: 15px 18px; margin: 20px 0; background-color: #f8f9fa; border-radius: 0 6px 6px 0; color: #7f8c8d;">

<!-- 无序列表 -->
<ul style="margin: 18px 0; padding-left: 22px;">
    <li style="margin: 10px 0; line-height: 1.8;">

<!-- 有序列表 -->
<ol style="margin: 18px 0; padding-left: 22px;">
    <li style="margin: 10px 0; line-height: 1.8;">

<!-- 任务列表 -->
<section style="list-style: none; padding-left: 0; margin: 18px 0;">
    <section style="display: flex; align-items: flex-start; margin: 10px 0;">
        <span style="margin-right: 10px; margin-top: 3px;">☐</span>
        <span style="flex: 1;">

<!-- 表格 -->
<table style="width: 100%; border-collapse: collapse; margin: 22px 0; border: 1px solid #e8ecf1; border-radius: 6px; font-size: 14px;">
    <thead>
        <tr style="background-color: #f8f9fa;">
            <th style="padding: 12px 15px; text-align: left; border-bottom: 1px solid #e8ecf1; color: #2c3e50; font-weight: 600; font-size: 12px;">
            <td style="padding: 12px 15px; text-align: left; border-bottom: 1px solid #e8ecf1;">
    <tbody>
        <tr style="background-color: #f8f9fa;">
            <td style="padding: 12px 15px; border-bottom: 1px solid #e8ecf1;">
        <tr style="background-color: #ffffff;">
            <td style="padding: 12px 15px; border-bottom: 1px solid #e8ecf1;">

<!-- 警告框 - Info -->
<section style="padding: 14px 16px; border-radius: 6px; margin: 20px 0; border-left: 4px solid #0366d6; background-color: #e8f4fd; color: #2c3e50;">

<!-- 警告框 - Warning -->
<section style="padding: 14px 16px; border-radius: 6px; margin: 20px 0; border-left: 4px solid #e36209; background-color: #fff5e8; color: #2c3e50;">

<!-- 警告框 - Success -->
<section style="padding: 14px 16px; border-radius: 6px; margin: 20px 0; border-left: 4px solid #28a745; background-color: #e8ffed; color: #2c3e50;">

<!-- 链接 -->
<a style="color: #0366d6; text-decoration: underline;">

<!-- 强调 -->
<strong style="font-weight: 600; color: #2c3e50;">

<!-- 分隔线 -->
<hr style="border: none; height: 1px; background-color: #e8ecf1; margin: 35px 0;">

<!-- 图片 -->
<img style="max-width: 100%; height: auto; border-radius: 6px; margin: 18px 0; display: block; border: 1px solid #e8ecf1;">
