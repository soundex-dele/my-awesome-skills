<section style="padding: 15px 10px; background-color: #fff9f5; font-size: 16px; line-height: 1.8; color: #5d513c; font-family: -apple-system, BlinkMacSystemFont, Hiragino Sans, Yu Gothic, sans-serif;">
    <section style="max-width: 680px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; border: 1px solid #f5e6d3;">
        <section style="padding: 30px 22px;">
            <!-- 头部 -->
            <section style="text-align: center; margin-bottom: 30px; padding-bottom: 22px; border-bottom: 2px solid #f5e6d3;">
                <section style="display: inline-block; background-color: #f4a688; color: white; padding: 5px 14px; border-radius: 16px; font-size: 12px; font-weight: 600; margin-bottom: 15px;">
                    Blog
                </section>

                <h1 style="font-size: 20px; font-weight: 600; margin: 12px 0; color: #5d513c; line-height: 1.4;">
                    {{title}}
                </h1>

                <section style="margin-top: 12px;">
                    <span style="background-color: #fff9f5; padding: 6px 12px; border-radius: 8px; font-size: 12px; color: #a89f91; margin: 0 6px;">
                        ✦ {{author}}
                    </span>
                    <span style="background-color: #fff9f5; padding: 6px 12px; border-radius: 8px; font-size: 12px; color: #a89f91; margin: 0 6px;">
                        ✦ {{date}}
                    </span>
                </section>
            </section>

            <!-- 内容区域 -->
            <main style="font-size: 15px;">
                {{content}}
            </main>

            <!-- 页脚 -->
            <footer style="margin-top: 35px; padding-top: 20px; border-top: 2px solid #f5e6d3; text-align: center; color: #a89f91; font-size: 13px;">
                ありがとうございました 🌸
            </footer>
        </section>
    </section>
</section>

<!-- 内容元素样式 -->

<!-- 段落 -->
<p style="margin-bottom: 18px; text-align: justify; line-height: 1.8;">

<!-- 二级标题 -->
<h2 style="font-size: 17px; margin: 28px 0 16px; text-align: center; padding: 10px 0; color: #5d513c; border-top: 2px solid #8fbc8f; border-bottom: 2px solid #8fbc8f;">

<!-- 三级标题 -->
<h3 style="font-size: 15px; margin: 22px 0 12px; color: #f4a688; font-weight: 600;">
    <span style="display: inline-block; width: 5px; height: 5px; background-color: #8fbc8f; border-radius: 50%; margin-right: 8px;"></span>

<!-- 代码块 -->
<pre style="background-color: #f5f0e8; border-radius: 8px; padding: 16px; margin: 20px 0; border: 1px solid #f5e6d3; overflow-x: auto; font-size: 13px; line-height: 1.6; color: #5d513c;">

<!-- 行内代码 -->
<code style="background-color: #fff9f5; padding: 3px 8px; border-radius: 4px; font-size: 13px; color: #f4a688;">

<!-- 引用块 -->
<blockquote style="border-left: 3px solid #8fbc8f; padding: 14px 18px; margin: 20px 0; background-color: #fff9f5; border-radius: 0 6px 6px 0; color: #a89f91;">

<!-- 无序列表 -->
<ul style="margin: 18px 0; padding-left: 22px;">
    <li style="margin: 10px 0; line-height: 1.8;">

<!-- 有序列表 -->
<ol style="margin: 18px 0; padding-left: 22px;">
    <li style="margin: 10px 0; padding-left: 5px; line-height: 1.8;">

<!-- 表格 -->
<table style="width: 100%; border-collapse: collapse; margin: 22px 0; border-radius: 6px; border: 1px solid #f5e6d3; font-size: 14px;">
    <thead>
        <tr style="background-color: #f4a688; color: white;">
            <th style="padding: 10px 13px; text-align: left; font-weight: 500;">
            <td style="padding: 10px 13px; text-align: left; border-bottom: 1px solid #f5e6d3;">
    <tbody>
        <tr style="background-color: #fff9f5;">
            <td style="padding: 10px 13px; border-bottom: 1px solid #f5e6d3;">
        <tr style="background-color: #ffffff;">
            <td style="padding: 10px 13px; border-bottom: 1px solid #f5e6d3;">

<!-- 链接 -->
<a style="color: #8fbc8f; text-decoration: underline;">

<!-- 强调 -->
<strong style="color: #f4a688; font-weight: 600;">

<em style="color: #8fbc8f;">

<!-- 分隔线 -->
<hr style="border: none; height: 1px; background-color: #f5e6d3; margin: 30px 0;">

<!-- 图片 -->
<img style="max-width: 100%; height: auto; border-radius: 6px; margin: 18px 0; display: block;">
