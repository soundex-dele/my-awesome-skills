<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        overflow: hidden;
      }

      #logo {
        width: 100%;
        height: 100%;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .logo-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-text {
        font-family: Inter, system-ui, -apple-system, sans-serif;
        font-size: 120px;
        font-weight: 800;
        color: #3b82f6;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        position: relative;
        z-index: 2;
      }

      .logo-glow {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
        z-index: 1;
        opacity: 0;
      }

      .logo-shadow {
        position: absolute;
        bottom: -8px;
        left: 8px;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        font-size: 120px;
        font-weight: 800;
        color: rgba(0, 0, 0, 0.3);
        letter-spacing: 0.02em;
        text-transform: uppercase;
        z-index: 0;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="logo" data-composition-id="logo" data-start="0" data-duration="4" data-width="1920" data-height="1080">
      <div class="logo-container">
        <div class="logo-shadow" id="shadow">MODERN</div>
        <div class="logo-glow" id="glow"></div>
        <div class="logo-text" id="text">MODERN</div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });

        // Scale in + fade animation
        tl.from("#text", {
          scale: 0.3,
          opacity: 0,
          duration: 0.8,
          ease: "back.out(1.7)"
        }, 0);

        tl.to("#glow", {
          opacity: 1,
          duration: 0.6,
          ease: "power2.out"
        }, 0.3);

        tl.to("#shadow", {
          opacity: 1,
          duration: 0.4,
          ease: "power2.out"
        }, 0.4);

        // Hold for 3 seconds, then fade out
        tl.to("#text", {
          opacity: 0,
          scale: 1.1,
          duration: 0.5,
          ease: "power2.in"
        }, 3.5);

        tl.to("#glow", {
          opacity: 0,
          duration: 0.3
        }, 3.5);

        tl.to("#shadow", {
          opacity: 0,
          duration: 0.3
        }, 3.5);

        window.__timelines["logo"] = tl;
      </script>
    </div>
  </body>
</html>
