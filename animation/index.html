<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparent Animation Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 透明背景 - 不设置 background-color */
            width: 800px;
            height: 600px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 动画元素 */
        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: absolute;
            animation: pulse 2s ease-in-out infinite;
        }

        .circle:nth-of-type(1) {
            animation-delay: 0s;
            width: 120px;
            height: 120px;
        }

        .circle:nth-of-type(2) {
            animation-delay: 0.3s;
            width: 180px;
            height: 180px;
            opacity: 0.8;
        }

        .circle:nth-of-type(3) {
            animation-delay: 0.6s;
            width: 240px;
            height: 240px;
            opacity: 0.6;
        }

        .text {
            position: absolute;
            font-family: 'Arial', sans-serif;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            animation: fadeInUp 1.5s ease-out forwards;
            opacity: 0;
            z-index: 10;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(-100px) rotate(180deg);
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="text">AI创作工具</div>
        <div class="particle" style="left: 20%; top: 30%;"></div>
        <div class="particle" style="left: 80%; top: 40%; animation-delay: 1s;"></div>
        <div class="particle" style="left: 50%; top: 70%; animation-delay: 2s;"></div>
    </div>

    <script>
        // 暴露给 Puppeteer 控制的接口
        window.seekTo = function(time) {
            // 重置所有动画
            document.body.style.display = 'none';
            document.body.offsetHeight; // 触发重排
            document.body.style.display = 'block';

            // 设置动画的负延迟来模拟时间跳跃
            const style = document.createElement('style');
            style.textContent = `
                * {
                    animation-delay: -${time}s !important;
                }
            `;
            document.head.appendChild(style);

            return time;
        };

        window.getTotalDuration = function() {
            return 5; // 总时长 5 秒
        };

        console.log('Animation loaded. Total duration: 5s');
    </script>
</body>
</html>
