<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI智能体动态背景 - 横屏</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #38bdf8;
  --secondary: #0ea5e9;
  --accent: #a78bfa;
}

body {
  width: 1920px;
  height: 1080px;
  background: linear-gradient(135deg, #3d2a6e 0%, #4e3a7c 50%, #3d2a6e 100%);
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
  position: relative;
  cursor: none;
}

/* 网格背景 */
.grid-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(rgba(56, 189, 248, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56, 189, 248, 0.08) 1px, transparent 1px);
  background-size: 50px 50px;
  opacity: 0.8;
}

/* 浮动粒子 */
.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

/* 神经网络节点 */
.node {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--primary);
  border-radius: 50%;
  box-shadow: 0 0 15px var(--primary), 0 0 30px var(--primary);
  pointer-events: none;
}

/* 数据流 */
.data-stream-h {
  position: absolute;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  pointer-events: none;
}


/* AI图标 */
.ai-icon {
  position: absolute;
  font-size: 36px;
  pointer-events: none;
  transform: rotate(-90deg);
}

/* 代码文字 */
.code-text {
  position: absolute;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: var(--primary);
  opacity: 0.25;
  pointer-events: none;
  transform: rotate(-90deg);
}

/* 波纹 */
.ripple {
  position: absolute;
  border: 1px solid var(--primary);
  border-radius: 50%;
  pointer-events: none;
}

</style>
</head>
<body>

<div class="grid-bg"></div>
<div id="particles"></div>
<div id="nodes"></div>
<div id="streamsH"></div>
<div id="icons"></div>
<div id="codes"></div>
<div id="ripples"></div>

<script>
const WIDTH = 1920;
const HEIGHT = 1080;
const PRIMARY = '#38bdf8';
const SECONDARY = '#0ea5e9';
const ACCENT = '#a78bfa';
const COLORS = [PRIMARY, SECONDARY, ACCENT, '#7dd3fc', '#60a5fa'];

// 动画帧
let animationId;
let elements = [];

// 创建浮动粒子
function createParticles() {
  const container = document.getElementById('particles');
  const count = 10;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';

    const size = Math.random() * 5 + 2;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];

    el.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      background: ${color};
      box-shadow: 0 0 ${size * 2}px ${color};
    `;

    container.appendChild(el);

    elements.push({
      el,
      type: 'particle',
      x: Math.random() * WIDTH,
      y: Math.random() * HEIGHT,
      speed: Math.random() * 0.3 + 0.2,
      direction: Math.random() > 0.5 ? 1 : -1
    });
  }
}

// 创建神经网络节点
function createNodes() {
  const container = document.getElementById('nodes');
  const count = 30;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'node';

    const scale = Math.random() * 0.5 + 0.8;
    el.style.transform = `scale(${scale})`;

    container.appendChild(el);

    elements.push({
      el,
      type: 'node',
      x: Math.random() * WIDTH,
      y: Math.random() * HEIGHT,
      phase: Math.random() * Math.PI * 2
    });
  }
}

// 创建横向数据流
function createHorizontalStreams() {
  const container = document.getElementById('streamsH');
  const count = 12;

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'data-stream-h';

    const width = Math.random() * 200 + 100;
    el.style.width = `${width}px`;

    container.appendChild(el);

    elements.push({
      el,
      type: 'streamH',
      x: -width,
      y: Math.random() * HEIGHT,
      width,
      speed: Math.random() * 4 + 2
    });
  }
}



// 创建AI图标
function createIcons() {
  const container = document.getElementById('icons');
  const icons = ['🤖', '🧠', '💡', '⚡', '🔮', '🚀', '🎯', '✨'];

  const positions = [
    { x: 150, y: 100 },
    { x: WIDTH - 200, y: 200 },
    { x: 300, y: HEIGHT - 150 },
    { x: WIDTH - 350, y: HEIGHT - 200 },
    { x: WIDTH / 2 - 50, y: 150 },
    { x: WIDTH / 2 + 100, y: HEIGHT - 180 },
    { x: 600, y: 300 },
    { x: WIDTH - 500, y: 400 },
  ];

  positions.forEach((pos, i) => {
    const el = document.createElement('div');
    el.className = 'ai-icon';
    el.textContent = icons[i];
    el.style.cssText = `
      left: ${pos.x}px;
      top: ${pos.y}px;
    `;
    container.appendChild(el);

    elements.push({
      el,
      type: 'icon',
      phase: i * 0.8
    });
  });
}

// 创建代码文字
function createCodes() {
  const container = document.getElementById('codes');
  const codes = ['AI', 'GPT', 'LLM', 'ML', 'DL', 'API', 'GPU', 'NLP'];

  for (let i = 0; i < 25; i++) {
    const el = document.createElement('div');
    el.className = 'code-text';
    el.textContent = codes[Math.floor(Math.random() * codes.length)];

    container.appendChild(el);

    elements.push({
      el,
      type: 'code',
      x: Math.random() * (WIDTH - 50),
      y: Math.random() * HEIGHT,
      speed: Math.random() * 0.3 + 0.2,
      phase: Math.random() * Math.PI * 2
    });
  }
}

// 创建波纹
function createRipples() {
  const container = document.getElementById('ripples');

  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'ripple';

    container.appendChild(el);

    elements.push({
      el,
      type: 'ripple',
      x: Math.random() * WIDTH,
      y: Math.random() * HEIGHT,
      size: 0,
      maxSize: Math.random() * 120 + 80,
      speed: Math.random() * 0.5 + 0.3
    });
  }
}

// 动画循环
let time = 0;
function animate() {
  time += 0.016;

  elements.forEach(item => {
    switch (item.type) {
      case 'particle':
        item.y -= item.speed * item.direction;
        if (item.y < -20) item.y = HEIGHT + 20;
        if (item.y > HEIGHT + 20) item.y = -20;
        item.el.style.left = `${item.x}px`;
        item.el.style.top = `${item.y}px`;
        break;

      case 'node':
        const pulse = Math.sin(time * 2 + item.phase) * 0.5 + 0.5;
        item.el.style.left = `${item.x}px`;
        item.el.style.top = `${item.y}px`;
        item.el.style.opacity = 0.5 + pulse * 0.5;
        item.el.style.boxShadow = `0 0 ${15 + pulse * 15}px ${PRIMARY}, 0 0 ${30 + pulse * 20}px ${PRIMARY}`;
        break;

      case 'streamH':
        item.x += item.speed;
        if (item.x > WIDTH) item.x = -item.width;
        item.el.style.left = `${item.x}px`;
        item.el.style.top = `${item.y}px`;
        break;

      case 'icon':
        const scale = 1 + Math.sin(time + item.phase) * 0.15;
        const opacity = 0.12 + Math.sin(time * 0.5 + item.phase) * 0.08;
        item.el.style.transform = `rotate(-90deg) scale(${scale})`;
        item.el.style.opacity = opacity;
        break;

      case 'code':
        item.y += item.speed;
        if (item.y > HEIGHT) item.y = -20;
        const codeOpacity = 0.15 + Math.sin(time + item.phase) * 0.1;
        item.el.style.left = `${item.x}px`;
        item.el.style.top = `${item.y}px`;
        item.el.style.opacity = codeOpacity;
        break;

      case 'ripple':
        item.size += item.speed;
        if (item.size > item.maxSize) {
          item.size = 0;
          item.x = Math.random() * WIDTH;
          item.y = Math.random() * HEIGHT;
        }
        const rippleOpacity = 1 - (item.size / item.maxSize);
        item.el.style.left = `${item.x - item.size / 2}px`;
        item.el.style.top = `${item.y - item.size / 2}px`;
        item.el.style.width = `${item.size}px`;
        item.el.style.height = `${item.size}px`;
        item.el.style.opacity = rippleOpacity * 0.4;
        break;
    }
  });

  animationId = requestAnimationFrame(animate);
}

// 初始化
function init() {
  createParticles();
  createNodes();
  // createHorizontalStreams();
  createIcons();
  createCodes();
  createRipples();
  animate();
}

init();

// 完成信号
setTimeout(() => {
  window.animationFinished = true;
}, 60000);
</script>

</body>
</html>
