<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand-drawn Boat Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 透明背景 */
            width: 800px;
            height: 600px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/roughjs@4.5.2/bundled/rough.esm.js" type="module"></script>
    <script type="module">
        import rough from 'https://cdn.jsdelivr.net/npm/roughjs@4.5.2/bundled/rough.esm.js';

        const canvas = document.getElementById('canvas');
        const rc = rough.canvas(canvas);
        const ctx = canvas.getContext('2d');

        // 设置画布尺寸
        canvas.width = 800;
        canvas.height = 600;

        // 动画状态
        let animationFrame = null;
        let startTime = null;
        const TOTAL_DURATION = 5;

        // 手绘样式配置
        const sketchStyle = {
            roughness: 1.5,
            bowing: 2,
            stroke: '#2c3e50',
            strokeWidth: 2,
            fill: 'none',
            fillStyle: 'zigzag',
            hachureAngle: -45,
            hachureGap: 5
        };

        const waterStyle = {
            roughness: 2,
            bowing: 3,
            stroke: '#3498db',
            strokeWidth: 1.5,
            fill: 'rgba(52, 152, 219, 0.1)',
            fillStyle: 'dots'
        };

        const sunStyle = {
            roughness: 1,
            bowing: 1,
            stroke: '#f39c12',
            strokeWidth: 2,
            fill: '#f1c40f',
            fillStyle: 'solid'
        };

        // 绘制小船
        function drawBoat(x, y, wobble = 0) {
            ctx.save();
            ctx.translate(x, y + wobble);
            ctx.rotate(wobble * 0.02);

            // 船身
            rc.path(`
                M -60 0
                Q -70 20 -50 30
                L 50 30
                Q 70 20 60 0
                L 60 0
                Q 40 -10 0 -10
                Q -40 -10 -60 0
                Z
            `, {
                ...sketchStyle,
                fill: '#ecf0f1',
                fillStyle: 'zigzag',
                hachureGap: 8
            });

            // 船舱
            rc.rectangle(-25, -35, 50, 25, {
                ...sketchStyle,
                fill: '#d35400',
                fillStyle: 'zigzag',
                hachureGap: 6
            });

            // 桅杆
            rc.line(0, -35, 0, -100, {
                ...sketchStyle,
                strokeWidth: 3
            });

            // 帆
            rc.path(`
                M 5 -95
                Q 45 -70 50 -40
                L 5 -40
                Z
            `, {
                ...sketchStyle,
                fill: '#fff',
                fillStyle: 'solid'
            });

            // 旗帜
            rc.path(`
                M 0 -100
                L 25 -90
                L 0 -80
            `, {
                ...sketchStyle,
                fill: '#e74c3c',
                fillStyle: 'solid'
            });

            ctx.restore();
        }

        // 绘制水波
        function drawWater(offsetY, time) {
            for (let i = 0; i < 8; i++) {
                const y = offsetY + i * 25;
                const waveOffset = Math.sin(time * 2 + i * 0.5) * 5;

                rc.path(`
                    M -50 ${y + Math.sin(time + i) * 3}
                    ${Array.from({length: 20}, (_, j) => {
                        const x = j * 50;
                        const waveY = Math.sin(time * 2 + j * 0.3 + i * 0.5) * 8 + waveOffset;
                        return `Q ${x + 25} ${y + waveY - 8} ${x + 50} ${y + waveY}`;
                    }).join(' ')}
                `, {
                    ...waterStyle,
                    stroke: `rgba(52, 152, 219, ${0.8 - i * 0.08})`,
                    fill: i === 0 ? 'rgba(52, 152, 219, 0.15)' : 'none'
                });
            }
        }

        // 绘制太阳
        function drawSun(time) {
            const x = 680;
            const y = 80;
            const pulse = Math.sin(time * 1.5) * 3;

            // 光芒
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2 + time * 0.2;
                const innerR = 35 + pulse;
                const outerR = 50 + pulse;

                rc.line(
                    x + Math.cos(angle) * innerR,
                    y + Math.sin(angle) * innerR,
                    x + Math.cos(angle) * outerR,
                    y + Math.sin(angle) * outerR,
                    {
                        ...sunStyle,
                        strokeWidth: 2
                    }
                );
            }

            // 太阳本体
            rc.circle(x, y, 50 + pulse, {
                ...sunStyle,
                fillStyle: 'dots',
                fill: '#f1c40f'
            });
        }

        // 绘制云朵
        function drawCloud(x, y, time) {
            const drift = Math.sin(time * 0.3) * 5;

            rc.path(`
                M ${x + drift} ${y}
                Q ${x - 20 + drift} ${y - 20} ${x + drift} ${y - 30}
                Q ${x + 30 + drift} ${y - 40} ${x + 50 + drift} ${y - 20}
                Q ${x + 80 + drift} ${y - 10} ${x + 60 + drift} ${y}
                Q ${x + 40 + drift} ${y + 10} ${x + drift} ${y}
            `, {
                ...sketchStyle,
                stroke: '#bdc3c7',
                fill: 'rgba(255, 255, 255, 0.5)',
                fillStyle: 'solid'
            });
        }

        // 绘制飞鸟
        function drawBird(x, y, time) {
            const flapY = Math.sin(time * 8) * 3;

            rc.path(`
                M ${x - 8} ${y + flapY}
                Q ${x - 4} ${y - 3 + flapY} ${x} ${y + flapY}
                Q ${x + 4} ${y - 3 + flapY} ${x + 8} ${y + flapY}
            `, {
                stroke: '#2c3e50',
                strokeWidth: 1.5,
                roughness: 1
            });
        }

        // 主绘制函数
        function draw(time) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 太阳
            drawSun(time);

            // 云朵
            drawCloud(150, 100, time);
            drawCloud(400, 150, time);

            // 飞鸟
            drawBird(200 + time * 30, 180, time);
            drawBird(230 + time * 30, 200, time);

            // 水波
            drawWater(380, time);

            // 小船（从左到右移动）
            const boatX = 100 + time * 120;
            const wobble = Math.sin(time * 3) * 5;
            drawBoat(boatX, 350, wobble);
        }

        // 动画循环
        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = (timestamp - startTime) / 1000;
            const time = elapsed % TOTAL_DURATION;

            draw(time);
            animationFrame = requestAnimationFrame(animate);
        }

        // 启动动画
        function startAnimation() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            startTime = null;
            animationFrame = requestAnimationFrame(animate);
        }

        // Puppeteer 接口
        window.seekTo = function(time) {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            draw(time);
            return time;
        };

        window.getTotalDuration = function() {
            return TOTAL_DURATION;
        };

        // 初始化
        startAnimation();
        console.log('Animation loaded. Total duration: ' + TOTAL_DURATION + 's');
    </script>
</body>
</html>
