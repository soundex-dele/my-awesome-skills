<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神嘴马良素材生成器 - 手绘风格字幕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 800px;
            height: 600px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script type="module">
        import rough from 'https://cdn.jsdelivr.net/npm/roughjs@4.5.2/bundled/rough.esm.js';

        const canvas = document.getElementById('canvas');
        const rc = rough.canvas(canvas);
        const ctx = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 600;

        const TOTAL_DURATION = 5;
        let animationFrame = null;
        let startTime = null;

        // 手绘样式
        const textStrokeStyle = {
            roughness: 2,
            bowing: 3,
            stroke: '#ffffff',
            strokeWidth: 3,
            fill: 'none'
        };

        const textFillStyle = {
            roughness: 1.5,
            bowing: 2,
            stroke: '#ffffff',
            strokeWidth: 1,
            fill: '#ffffff',
            fillStyle: 'zigzag',
            hachureGap: 4
        };

        const decorationStyle = {
            roughness: 2.5,
            bowing: 4,
            stroke: '#a855f7',
            strokeWidth: 2,
            fill: 'none'
        };

        // 手绘文字路径数据
        const charPaths = {
            '神': [
                // 示字旁
                'M 30 20 L 30 80',
                'M 20 30 L 50 30',
                'M 15 50 L 45 50',
                // 申部分
                'M 55 20 L 55 80',
                'M 55 50 L 85 50',
                'M 85 20 L 85 80',
                'M 55 30 L 85 30',
                'M 55 70 L 85 70'
            ],
            '嘴': [
                'M 20 30 L 20 80',
                'M 35 30 L 35 80',
                'M 20 50 L 50 50',
                'M 60 20 L 60 80',
                'M 75 40 L 90 40',
                'M 75 60 L 90 60'
            ],
            '马': [
                'M 20 30 L 60 30',
                'M 20 30 L 20 70',
                'M 20 70 L 60 70',
                'M 60 30 L 80 50',
                'M 80 50 L 80 80'
            ],
            '良': [
                'M 30 20 L 30 80',
                'M 15 40 L 60 40',
                'M 40 40 L 40 80',
                'M 40 60 L 70 80'
            ],
            '素': [
                'M 40 20 L 40 50',
                'M 20 50 L 60 50',
                'M 30 50 L 30 80',
                'M 50 50 L 50 80'
            ],
            '材': [
                'M 20 20 L 20 80',
                'M 20 50 L 50 50',
                'M 60 30 L 60 80',
                'M 60 50 L 90 30',
                'M 60 50 L 90 70'
            ],
            '生': [
                'M 30 20 L 30 50',
                'M 15 35 L 60 35',
                'M 40 35 L 40 80',
                'M 20 60 L 60 80'
            ],
            '成': [
                'M 20 30 L 20 70',
                'M 20 50 L 50 50',
                'M 60 20 L 60 80',
                'M 60 40 L 90 20',
                'M 60 60 L 90 80'
            ],
            '器': [
                'M 20 20 L 60 20',
                'M 20 20 L 20 50',
                'M 60 20 L 60 50',
                'M 20 50 L 60 50',
                'M 40 50 L 40 70',
                'M 20 70 L 60 70',
                'M 30 70 L 30 90',
                'M 50 70 L 50 90'
            ]
        };

        // 简化的手绘文字（使用矩形组合表示）
        const titleChars = ['神', '嘴', '马', '良', '素', '材', '生', '成', '器'];

        // 绘制手绘风格文字
        function drawHandDrawnText(text, x, y, size, progress, color = '#ffffff') {
            const charWidth = size * 0.9;
            const charGap = size * 0.15;

            text.split('').forEach((char, i) => {
                const charX = x + i * (charWidth + charGap);
                const charProgress = Math.max(0, Math.min(1, (progress - i * 0.08) / 0.3));

                if (charProgress <= 0) return;

                ctx.save();
                ctx.globalAlpha = charProgress;

                // 手绘方框代表每个字
                const boxSize = size * 0.8;
                const offsetX = charX;
                const offsetY = y - boxSize / 2;

                // 外框
                rc.rectangle(offsetX, offsetY, boxSize, boxSize, {
                    roughness: 2,
                    bowing: 3,
                    stroke: color,
                    strokeWidth: 3,
                    fill: 'rgba(255, 255, 255, 0.1)',
                    fillStyle: 'zigzag',
                    hachureGap: 8
                });

                // 内部装饰线
                const innerPadding = boxSize * 0.15;
                rc.rectangle(offsetX + innerPadding, offsetY + innerPadding,
                    boxSize - innerPadding * 2, boxSize - innerPadding * 2, {
                    roughness: 1.5,
                    bowing: 2,
                    stroke: color,
                    strokeWidth: 1.5,
                    fill: 'none'
                });

                // 绘制简化的笔画示意
                const centerX = offsetX + boxSize / 2;
                const centerY = offsetY + boxSize / 2;

                // 横线
                rc.line(offsetX + boxSize * 0.2, centerY,
                    offsetX + boxSize * 0.8, centerY, {
                    roughness: 2,
                    bowing: 2,
                    stroke: color,
                    strokeWidth: 2
                });

                // 竖线
                rc.line(centerX, offsetY + boxSize * 0.2,
                    centerX, offsetY + boxSize * 0.8, {
                    roughness: 2,
                    bowing: 2,
                    stroke: color,
                    strokeWidth: 2
                });

                ctx.restore();
            });
        }

        // 绘制手绘风格的真实文字
        function drawSketchText(text, x, y, size, progress) {
            const charWidth = size * 1.1;
            const charGap = size * 0.1;

            ctx.save();
            ctx.font = `bold ${size}px "Microsoft YaHei", sans-serif`;
            ctx.textBaseline = 'middle';

            text.split('').forEach((char, i) => {
                const charX = x + i * (charWidth + charGap);
                const charProgress = Math.max(0, Math.min(1, (progress - i * 0.1) / 0.4));

                if (charProgress <= 0) return;

                // 绘制手绘边框
                const boxX = charX - size * 0.5;
                const boxY = y - size * 0.6;
                const boxSize = size * 1.2;

                // 摇晃的手绘方框
                const wobble = Math.sin(Date.now() * 0.003 + i) * 2;
                rc.rectangle(boxX + wobble, boxY, boxSize, boxSize, {
                    roughness: 2.5,
                    bowing: 4,
                    stroke: `rgba(255, 255, 255, ${charProgress * 0.6})`,
                    strokeWidth: 2,
                    fill: `rgba(255, 255, 255, ${charProgress * 0.05})`,
                    fillStyle: 'dots'
                });

                // 绘制文字本身（用素描风格）
                const sketchProgress = Math.min(1, charProgress * 1.5);

                // 多次绘制营造手绘效果
                for (let j = 0; j < 3; j++) {
                    const offset = j * 0.5;
                    ctx.globalAlpha = sketchProgress * (0.8 - j * 0.2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(char, charX + offset + wobble * 0.5, y + offset);
                }
            });

            ctx.restore();
        }

        // 绘制装饰元素
        function drawDecorations(time) {
            // 左侧星形
            const starScale = 0.8 + Math.sin(time * 2) * 0.1;
            drawStar(60, 300, 20 * starScale, 5, time);

            // 右侧星形
            drawStar(740, 300, 20 * starScale, 5, time + 1);

            // 底部波浪线
            drawWaveLine(100, 480, 600, time);
            drawWaveLine(150, 500, 500, time + 0.5);

            // 顶部装饰
            drawScribble(400, 80, 60, time);

            // 圆圈装饰
            const circleScale = 1 + Math.sin(time * 1.5) * 0.1;
            rc.circle(120, 150, 30 * circleScale, {
                roughness: 2,
                bowing: 3,
                stroke: '#f59e0b',
                strokeWidth: 2,
                fill: 'rgba(245, 158, 11, 0.1)',
                fillStyle: 'zigzag'
            });

            rc.circle(680, 450, 25 * circleScale, {
                roughness: 2,
                bowing: 3,
                stroke: '#a855f7',
                strokeWidth: 2,
                fill: 'rgba(168, 85, 247, 0.1)',
                fillStyle: 'zigzag'
            });
        }

        // 绘制手绘星形
        function drawStar(x, y, size, points, time) {
            const rotation = time * 0.5;
            const angle = Math.PI * 2 / points;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);

            let path = '';
            for (let i = 0; i < points * 2; i++) {
                const r = i % 2 === 0 ? size : size * 0.4;
                const px = Math.cos(angle * i - Math.PI / 2) * r;
                const py = Math.sin(angle * i - Math.PI / 2) * r;
                path += (i === 0 ? 'M' : 'L') + ` ${px} ${py} `;
            }
            path += 'Z';

            rc.path(path, {
                roughness: 2,
                bowing: 3,
                stroke: '#f59e0b',
                strokeWidth: 2,
                fill: 'rgba(245, 158, 11, 0.2)',
                fillStyle: 'dots'
            });

            ctx.restore();
        }

        // 绘制波浪线
        function drawWaveLine(x, y, width, time) {
            const segments = 10;
            let path = `M ${x} ${y}`;

            for (let i = 1; i <= segments; i++) {
                const px = x + (width / segments) * i;
                const py = y + Math.sin(time * 3 + i * 0.5) * 10;
                path += ` L ${px} ${py}`;
            }

            rc.path(path, {
                roughness: 2,
                bowing: 2,
                stroke: '#ffffff',
                strokeWidth: 2
            });
        }

        // 绘制涂鸦
        function drawScribble(x, y, size, time) {
            const rotation = time * 0.3;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);

            // 手绘圆圈
            rc.circle(0, 0, size, {
                roughness: 3,
                bowing: 5,
                stroke: '#a855f7',
                strokeWidth: 2,
                fill: 'none'
            });

            // 内部螺旋
            const spiralPoints = 20;
            let spiralPath = '';
            for (let i = 0; i < spiralPoints; i++) {
                const angle = (i / spiralPoints) * Math.PI * 3;
                const r = (i / spiralPoints) * size * 0.4;
                const px = Math.cos(angle) * r;
                const py = Math.sin(angle) * r;
                spiralPath += (i === 0 ? 'M' : 'L') + ` ${px} ${py}`;
            }

            rc.path(spiralPath, {
                roughness: 2,
                bowing: 3,
                stroke: '#f59e0b',
                strokeWidth: 1.5
            });

            ctx.restore();
        }

        // 绘制副标题
        function drawSubtitle(text, x, y, progress) {
            if (progress <= 0) return;

            ctx.save();
            ctx.globalAlpha = progress;
            ctx.font = '24px "Microsoft YaHei", sans-serif';
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';

            // 下划线
            const textWidth = ctx.measureText(text).width;
            rc.line(x - textWidth / 2 - 20, y + 20, x + textWidth / 2 + 20, y + 20, {
                roughness: 2,
                bowing: 3,
                stroke: '#a855f7',
                strokeWidth: 2
            });

            // 文字
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillText(text, x, y);

            ctx.restore();
        }

        // 绘制粒子效果
        function drawParticles(time) {
            const particleCount = 15;

            for (let i = 0; i < particleCount; i++) {
                const x = 100 + (i / particleCount) * 600;
                const y = 150 + Math.sin(time * 2 + i) * 50 + Math.sin(time * 3 + i * 0.5) * 30;
                const size = 3 + Math.sin(time + i) * 2;

                rc.circle(x, y, size, {
                    roughness: 1,
                    bowing: 1,
                    stroke: i % 2 === 0 ? '#ffffff' : '#f59e0b',
                    strokeWidth: 1,
                    fill: i % 2 === 0 ? 'rgba(255, 255, 255, 0.3)' : 'rgba(245, 158, 11, 0.3)',
                    fillStyle: 'solid'
                });
            }
        }

        // 主绘制函数
        function draw(time) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 粒子效果
            drawParticles(time);

            // 装饰元素
            drawDecorations(time);

            // 主标题
            const titleProgress = Math.min(1, time / 2);
            drawSketchText('神嘴马良素材生成skill', 130, 300, 50, titleProgress);

            // 副标题
            // const subtitleProgress = Math.max(0, (time - 2) / 1);
            // drawSubtitle('动动嘴 · 生成任意素材', 400, 380, subtitleProgress);
        }

        // 动画循环
        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = (timestamp - startTime) / 1000;
            const time = elapsed % TOTAL_DURATION;

            draw(time);
            animationFrame = requestAnimationFrame(animate);
        }

        function startAnimation() {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            startTime = null;
            animationFrame = requestAnimationFrame(animate);
        }

        // Puppeteer 接口
        window.seekTo = function(time) {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            draw(time);
            return time;
        };

        window.getTotalDuration = function() {
            return TOTAL_DURATION;
        };

        startAnimation();
        console.log('Animation loaded. Total duration: ' + TOTAL_DURATION + 's');
    </script>
</body>
</html>
