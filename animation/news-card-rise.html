<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻卡片上升动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 透明背景 */
            width: 800px;
            height: 600px;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            position: relative;
        }

        /* 新闻卡片样式 */
        .news-card {
            width: 480px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            display: flex;
            opacity: 0;
            transform: translateY(100px);
            animation: riseUp 1.2s ease-out forwards;
        }

        .news-card:nth-child(1) {
            animation-delay: 0s;
        }

        .news-card:nth-child(2) {
            animation-delay: 0.4s;
        }

        .card-image {
            width: 140px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .card-image::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .card-source {
            font-size: 12px;
            color: #666;
        }

        .card-time {
            font-size: 12px;
            color: #999;
        }

        /* 不同卡片配色 */
        .news-card:nth-child(2) .card-image {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @keyframes riseUp {
            0% {
                opacity: 0;
                transform: translateY(100px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="news-card">
            <div class="card-image"></div>
            <div class="card-content">
                <div class="card-title">人工智能技术突破：新模型在多项基准测试中刷新纪录</div>
                <div class="card-meta">
                    <span class="card-source">科技日报</span>
                    <span class="card-time">2小时前</span>
                </div>
            </div>
        </div>
        <div class="news-card">
            <div class="card-image"></div>
            <div class="card-content">
                <div class="card-title">数字经济蓬勃发展，上半年增速超过预期目标</div>
                <div class="card-meta">
                    <span class="card-source">经济观察报</span>
                    <span class="card-time">5小时前</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 暴露给 Puppeteer 控制的接口
        window.seekTo = function(time) {
            document.body.style.display = 'none';
            document.body.offsetHeight;
            document.body.style.display = 'block';

            const style = document.createElement('style');
            style.textContent = `
                .news-card:nth-child(1) {
                    animation-delay: -${time}s !important;
                }
                .news-card:nth-child(2) {
                    animation-delay: -${Math.max(0, time - 0.4)}s !important;
                }
            `;
            document.head.appendChild(style);

            return time;
        };

        window.getTotalDuration = function() {
            return 3;
        };

        console.log('News card animation loaded. Total duration: 3s');
    </script>
</body>
</html>
