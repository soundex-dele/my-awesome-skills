<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Input Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 800px;
            height: 600px;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 对话框容器 */
        .chat-container {
            width: 600px;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            animation: containerAppear 0.6s ease-out 0.3s forwards;
        }

        @keyframes containerAppear {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* 标题栏 */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 24px;
            border-radius: 16px 16px 0 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .dots {
            display: flex;
            gap: 8px;
        }

        .chat-header .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27ca40; }

        .chat-header .title {
            color: white;
            font-size: 14px;
            font-weight: 500;
            margin-left: 12px;
            opacity: 0.9;
        }

        /* 消息区域 */
        .chat-messages {
            background: rgba(255, 255, 255, 0.05);
            padding: 24px;
            min-height: 100px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-text {
            color: white;
            font-size: 15px;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* 输入框区域 */
        .input-area {
            background: rgba(255, 255, 255, 0.08);
            padding: 16px 20px;
            border-radius: 0 0 16px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .input-text {
            color: white;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
        }

        /* 光标 */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 20px;
            background: #667eea;
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 发送按钮 */
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .send-btn.active {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
            transform: rotate(-45deg);
        }

        /* Enter 提示 */
        .enter-hint {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            border-radius: 8px;
            padding: 8px 16px;
            color: #a5b4fc;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeInHint 0.4s ease-out forwards;
            animation-delay: 2.8s;
        }

        .enter-hint .key {
            background: rgba(102, 126, 234, 0.3);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }

        @keyframes fadeInHint {
            to { opacity: 1; }
        }

        /* 按下动画 */
        .enter-pressed {
            animation: keyPress 0.3s ease-out forwards;
        }

        @keyframes keyPress {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); background: rgba(102, 126, 234, 0.6); }
            100% { transform: scale(1); background: rgba(102, 126, 234, 0.3); }
        }

        /* 背景光效 */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: glowPulse 3s ease-in-out infinite;
        }

        .glow-1 {
            background: #667eea;
            top: 20%;
            left: 10%;
        }

        .glow-2 {
            background: #764ba2;
            bottom: 20%;
            right: 10%;
            animation-delay: 1.5s;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.5; }
        }

        /* 发送成功效果 */
        .sent-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.4) 0%, transparent 70%);
            animation: sentRipple 0.6s ease-out forwards;
            animation-delay: 3.2s;
            pointer-events: none;
        }

        @keyframes sentRipple {
            to {
                width: 800px;
                height: 800px;
                margin-left: -400px;
                margin-top: -400px;
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>

        <div class="chat-container">
            <div class="chat-header">
                <div class="dots">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                </div>
                <span class="title">AI 助手</span>
            </div>

            <div class="chat-messages">
                <div class="message">
                    <div class="avatar">AI</div>
                    <div class="message-content">
                        <div class="message-text">你好！有什么我可以帮助你的吗？</div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <span class="input-text" id="inputText"></span><span class="cursor" id="cursor"></span>
                </div>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="enter-hint" id="enterHint">
            按 <span class="key">Enter</span> 发送
        </div>

        <div class="sent-effect" id="sentEffect"></div>
    </div>

    <script>
        const text = "帮我生成图表";
        const inputText = document.getElementById('inputText');
        const cursor = document.getElementById('cursor');
        const sendBtn = document.getElementById('sendBtn');
        const enterHint = document.getElementById('enterHint');
        const sentEffect = document.getElementById('sentEffect');

        let charIndex = 0;
        let startTime = 1.2; // 开始输入的时间（秒）

        // 打字动画
        function typeChar() {
            if (charIndex < text.length) {
                inputText.textContent += text[charIndex];
                charIndex++;

                // 激活发送按钮
                if (charIndex === text.length) {
                    sendBtn.classList.add('active');
                }

                setTimeout(typeChar, 150 + Math.random() * 100);
            }
        }

        // 延迟开始打字
        setTimeout(typeChar, startTime * 1000);

        // Enter 按键动画
        setTimeout(() => {
            const key = enterHint.querySelector('.key');
            key.classList.add('enter-pressed');

            setTimeout(() => {
                key.classList.remove('enter-pressed');
                // 隐藏光标
                cursor.style.display = 'none';
                // 清空输入框
                setTimeout(() => {
                    inputText.style.opacity = '0';
                    enterHint.style.opacity = '0';
                }, 200);
            }, 300);
        }, 3500);

        // 暴露给 Puppeteer 控制的接口
        window.seekTo = function(time) {
            // 控制 CSS 动画
            let styleEl = document.getElementById('seek-style');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'seek-style';
                document.head.appendChild(styleEl);
            }
            styleEl.textContent = `
                * {
                    animation-delay: -${time}s !important;
                }
            `;

            // 控制打字动画
            // 打字开始时间: 1.2s, 每个字符约 200ms
            const typeStartTime = 1.2;
            const charDuration = 0.2;

            if (time < typeStartTime) {
                // 打字还未开始
                inputText.textContent = '';
                sendBtn.classList.remove('active');
                cursor.style.display = 'inline-block';
                inputText.style.opacity = '1';
                enterHint.style.opacity = '0';
            } else {
                // 计算已打出的字符数
                const elapsed = time - typeStartTime;
                const charCount = Math.min(text.length, Math.floor(elapsed / charDuration));
                inputText.textContent = text.substring(0, charCount);

                // 打字完成，激活发送按钮
                if (charCount >= text.length) {
                    sendBtn.classList.add('active');
                } else {
                    sendBtn.classList.remove('active');
                }
            }

            // 控制 Enter 按键动画 (3.5s 开始)
            const enterTime = 3.5;
            if (time >= enterTime && time < enterTime + 0.3) {
                enterHint.style.opacity = '1';
                enterHint.querySelector('.key').classList.add('enter-pressed');
            } else if (time >= enterTime + 0.3) {
                // 发送后
                cursor.style.display = 'none';
                enterHint.querySelector('.key').classList.remove('enter-pressed');
                inputText.style.opacity = '0';
                enterHint.style.opacity = '0';
            } else {
                enterHint.style.opacity = time >= 2.8 ? '1' : '0';
                enterHint.querySelector('.key').classList.remove('enter-pressed');
            }

            return time;
        };

        window.getTotalDuration = function() {
            return 5;
        };

        console.log('Animation loaded. Total duration: 5s');
    </script>
</body>
</html>
