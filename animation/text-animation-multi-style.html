<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多风格文字动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 800px;
            height: 600px;
            overflow: hidden;
            background: transparent;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .text-wrapper {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            gap: 6px;
            padding: 20px;
        }

        .char {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 48px;
            font-weight: bold;
            opacity: 0;
            position: relative;
        }

        /* 第1个字 - 弹跳进入 */
        .char:nth-child(1) {
            color: #ff6b6b;
            animation: bounceIn 0.8s ease-out 0.1s forwards;
        }

        /* 第2个字 - 旋转进入 */
        .char:nth-child(2) {
            color: #feca57;
            animation: rotateIn 0.6s ease-out 0.2s forwards;
        }

        /* 第3个字 - 缩放弹入 */
        .char:nth-child(3) {
            color: #48dbfb;
            animation: scaleIn 0.5s ease-out 0.3s forwards;
        }

        /* 第4个字 - 从左滑入 */
        .char:nth-child(4) {
            color: #ff9ff3;
            animation: slideFromLeft 0.6s ease-out 0.4s forwards;
        }

        /* 第5个字 - 从右滑入 */
        .char:nth-child(5) {
            color: #54a0ff;
            animation: slideFromRight 0.6s ease-out 0.5s forwards;
        }

        /* 第6个字 - 淡入上升 */
        .char:nth-child(6) {
            color: #5f27cd;
            animation: fadeInUp 0.7s ease-out 0.6s forwards;
        }

        /* 第7个字 - 波浪效果 */
        .char:nth-child(7) {
            color: #00d2d3;
            animation: waveIn 0.8s ease-out 0.7s forwards;
        }

        /* 第8个字 - 闪烁进入 */
        .char:nth-child(8) {
            color: #ff9f43;
            animation: blinkIn 0.6s ease-out 0.8s forwards;
        }

        /* 第9个字 - 弹性进入 */
        .char:nth-child(9) {
            color: #ee5a24;
            animation: elasticIn 0.8s ease-out 0.9s forwards;
        }

        /* 第10个字 - 翻转进入 */
        .char:nth-child(10) {
            color: #0abde3;
            animation: flipIn 0.7s ease-out 1s forwards;
        }

        /* 第11个字 - 打字机效果 */
        .char:nth-child(11) {
            color: #10ac84;
            animation: typewriter 0.1s steps(1) 1.1s forwards;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid #10ac84;
        }

        /* 关键帧动画 */
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3) translateY(-100px);
            }
            50% {
                opacity: 1;
                transform: scale(1.1) translateY(10px);
            }
            70% {
                transform: scale(0.9) translateY(-5px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes rotateIn {
            0% {
                opacity: 0;
                transform: rotate(-180deg) scale(0);
            }
            100% {
                opacity: 1;
                transform: rotate(0deg) scale(1);
            }
        }

        @keyframes scaleIn {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            70% {
                transform: scale(1.2);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideFromLeft {
            0% {
                opacity: 0;
                transform: translateX(-200px) rotate(-10deg);
            }
            100% {
                opacity: 1;
                transform: translateX(0) rotate(0deg);
            }
        }

        @keyframes slideFromRight {
            0% {
                opacity: 0;
                transform: translateX(200px) rotate(10deg);
            }
            100% {
                opacity: 1;
                transform: translateX(0) rotate(0deg);
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes waveIn {
            0% {
                opacity: 0;
                transform: translateY(-30px) rotate(-5deg);
            }
            25% {
                transform: translateY(10px) rotate(5deg);
            }
            50% {
                transform: translateY(-15px) rotate(-3deg);
            }
            75% {
                transform: translateY(5px) rotate(2deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
        }

        @keyframes blinkIn {
            0%, 20%, 40%, 60%, 80% {
                opacity: 0;
            }
            10%, 30%, 50%, 70%, 90%, 100% {
                opacity: 1;
            }
            0% {
                transform: scale(0.5);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes elasticIn {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            55% {
                transform: scale(1.3);
            }
            70% {
                transform: scale(0.9);
            }
            85% {
                transform: scale(1.1);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes flipIn {
            0% {
                opacity: 0;
                transform: perspective(400px) rotateY(90deg);
            }
            40% {
                transform: perspective(400px) rotateY(-10deg);
            }
            70% {
                transform: perspective(400px) rotateY(10deg);
            }
            100% {
                opacity: 1;
                transform: perspective(400px) rotateY(0deg);
            }
        }

        @keyframes typewriter {
            0% {
                opacity: 0;
                width: 0;
            }
            100% {
                opacity: 1;
                width: 100%;
            }
        }

        /* 装饰粒子 */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 2s ease-in-out infinite;
        }

        .particle:nth-child(1) { background: #ff6b6b; left: 10%; top: 20%; animation-delay: 0.5s; }
        .particle:nth-child(2) { background: #feca57; left: 90%; top: 30%; animation-delay: 0.7s; }
        .particle:nth-child(3) { background: #48dbfb; left: 15%; top: 80%; animation-delay: 0.9s; }
        .particle:nth-child(4) { background: #ff9ff3; left: 85%; top: 70%; animation-delay: 1.1s; }
        .particle:nth-child(5) { background: #54a0ff; left: 5%; top: 50%; animation-delay: 1.3s; }
        .particle:nth-child(6) { background: #5f27cd; left: 95%; top: 50%; animation-delay: 1.5s; }

        @keyframes particleFloat {
            0%, 100% {
                opacity: 0.6;
                transform: translateY(0) scale(1);
            }
            50% {
                opacity: 1;
                transform: translateY(-30px) scale(1.5);
            }
        }

        /* 光晕背景 */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,107,107,0.2) 0%, transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glowPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.8;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glow"></div>
        <div class="text-wrapper">
            <span class="char">你</span>
            <span class="char">想</span>
            <span class="char">要</span>
            <span class="char">啥</span>
            <span class="char">风</span>
            <span class="char">格</span>
            <span class="char">，</span>
            <span class="char">它</span>
            <span class="char">都</span>
            <span class="char">能</span>
            <span class="char">整</span>
        </div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <script>
        // 暴露给 Puppeteer 控制的接口
        window.seekTo = function(time) {
            document.body.style.display = 'none';
            document.body.offsetHeight;
            document.body.style.display = 'block';

            const style = document.createElement('style');
            style.textContent = `
                * {
                    animation-delay: -${time}s !important;
                }
            `;
            document.head.appendChild(style);

            return time;
        };

        window.getTotalDuration = function() {
            return 4;
        };

        console.log('Animation loaded. Total duration: 4s');
    </script>
</body>
</html>
