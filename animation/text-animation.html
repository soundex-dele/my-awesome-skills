<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具宣传动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 800px;
            height: 600px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 透明背景 */
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 背景装饰圆环 */
        .bg-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.15);
            animation: ring-expand 4s ease-out both;
        }

        .bg-ring:nth-child(1) {
            width: 300px;
            height: 300px;
            animation-delay: 0s;
        }

        .bg-ring:nth-child(2) {
            width: 450px;
            height: 450px;
            animation-delay: 0.3s;
        }

        .bg-ring:nth-child(3) {
            width: 600px;
            height: 600px;
            animation-delay: 0.6s;
        }

        @keyframes ring-expand {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
        }

        /* 主文字容器 */
        .text-main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 700px;
            z-index: 10;
            margin-bottom: 30px;
        }

        .text-main .char {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            font-size: 52px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            opacity: 0;
            animation: char-fly-in 0.6s ease-out both;
            animation-delay: calc(var(--i) * 0.08s);
        }

        .text-main .char.highlight {
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }

        @keyframes char-fly-in {
            0% {
                opacity: 0;
                transform: translateY(-60px) scale(0.5);
            }
            60% {
                opacity: 1;
                transform: translateY(5px) scale(1.1);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 副标题容器 */
        .text-sub {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 700px;
            z-index: 10;
        }

        .text-sub .char {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            font-size: 36px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            opacity: 0;
            animation: char-slide-in 0.5s ease-out both;
            animation-delay: calc(1s + var(--i) * 0.06s);
        }

        @keyframes char-slide-in {
            0% {
                opacity: 0;
                transform: translateX(-30px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 装饰粒子 */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffd700;
            border-radius: 50%;
            animation: particle-float 3s ease-in-out both;
            box-shadow: 0 0 10px #ffd700;
        }

        @keyframes particle-float {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
            20% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(0.5);
            }
        }

        /* 底部装饰线 */
        .underline-deco {
            position: absolute;
            bottom: 180px;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            animation: line-grow 1s ease-out both;
            animation-delay: 2.5s;
        }

        @keyframes line-grow {
            0% {
                width: 0;
            }
            100% {
                width: 500px;
            }
        }

        /* 闪烁高亮效果 */
        .glow-spot {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: glow-pulse 2s ease-in-out both;
            animation-delay: 3s;
        }

        @keyframes glow-pulse {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.3);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 背景装饰圆环 -->
        <div class="bg-ring"></div>
        <div class="bg-ring"></div>
        <div class="bg-ring"></div>

        <!-- 主标题：不费token不排队 -->
        <div class="text-main">
            <span class="char" style="--i: 0">不</span>
            <span class="char" style="--i: 1">费</span>
            <span class="char highlight" style="--i: 2">token</span>
            <span class="char" style="--i: 3">不</span>
            <span class="char" style="--i: 4">排</span>
            <span class="char" style="--i: 5">队</span>
        </div>

        <!-- 副标题：动动嘴就能生成任意素材 -->
        <div class="text-sub">
            <span class="char" style="--i: 0">动</span>
            <span class="char" style="--i: 1">动</span>
            <span class="char" style="--i: 2">嘴</span>
            <span class="char" style="--i: 3">就</span>
            <span class="char" style="--i: 4">能</span>
            <span class="char" style="--i: 5">生</span>
            <span class="char" style="--i: 6">成</span>
            <span class="char" style="--i: 7">任</span>
            <span class="char" style="--i: 8">意</span>
            <span class="char" style="--i: 9">素</span>
            <span class="char" style="--i: 10">材</span>
        </div>

        <!-- 底部装饰线 -->
        <div class="underline-deco"></div>

        <!-- 装饰粒子 -->
        <div class="particle" style="left: 15%; top: 20%; animation-delay: 0.5s;"></div>
        <div class="particle" style="left: 85%; top: 25%; animation-delay: 0.8s;"></div>
        <div class="particle" style="left: 25%; top: 75%; animation-delay: 1.2s;"></div>
        <div class="particle" style="left: 75%; top: 70%; animation-delay: 1.5s;"></div>
        <div class="particle" style="left: 10%; top: 50%; animation-delay: 1.8s;"></div>
        <div class="particle" style="left: 90%; top: 55%; animation-delay: 2.1s;"></div>

        <!-- 闪烁高亮 -->
        <div class="glow-spot" style="top: 30%; left: 20%;"></div>
        <div class="glow-spot" style="top: 40%; right: 15%; animation-delay: 3.3s;"></div>
    </div>

    <script>
        // HyperFrames 控制接口
        window.seekTo = function(time) {
            document.body.style.display = 'none';
            document.body.offsetHeight;
            document.body.style.display = 'block';

            const style = document.createElement('style');
            style.textContent = `* { animation-delay: -${time}s !important; }`;
            document.head.appendChild(style);

            return time;
        };

        window.getTotalDuration = function() {
            return 5;
        };

        console.log('Text animation loaded. Total duration: 5s');
    </script>
</body>
</html>
